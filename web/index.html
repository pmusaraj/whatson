<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What's On</title>
    <link id="theme-link" rel="stylesheet" href="sense-theme.css?v=help-copy-2" />
    <link rel="stylesheet" href="styles.css?v=help-copy-2" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>What's On</h1>
      </div>
      <div class="header-controls">
        <input id="channel-search" class="search header-search" type="search" placeholder="Search" autocomplete="off" />
        <button id="mobile-search" class="mobile-search-button" type="button" aria-controls="channel-search" aria-expanded="false" aria-label="Search">⌕</button>
        <button id="mobile-menu" class="mobile-menu-button" type="button" aria-controls="channel-picker" aria-expanded="true" aria-label="Hide channels">☰</button>
      </div>
      <div class="status" id="status">Loading guide data…</div>
    </header>

    <main class="layout">
      <section id="channel-picker" class="panel picker-panel" aria-labelledby="picker-title">
        <div class="panel-heading compact-heading">
          <h2 id="picker-title">Channels</h2>
          <button id="clear-selection" class="secondary-button" type="button">Clear</button>
        </div>

        <div id="country-flags" class="country-flags" aria-label="Countries"></div>
        <div id="channel-list" class="channel-list"></div>
      </section>

      <section class="panel guide-panel" aria-label="TV guide">
        <div id="search-results" class="search-results" hidden></div>
        <div id="guide" class="guide"></div>
      </section>
    </main>

    <dialog id="program-dialog" class="program-dialog" aria-labelledby="program-dialog-title">
      <div id="program-dialog-content" class="program-dialog-content"></div>
      <form method="dialog">
        <button class="secondary-button program-dialog-close" type="submit">Close</button>
      </form>
    </dialog>

    <script src="app.js?v=help-copy-2"></script>
  </body>
</html>
