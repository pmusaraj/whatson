<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What's On TV</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>What's On TV</h1>
        <p class="lede">Pick up to five channels and compare what is on now.</p>
      </div>
      <div class="status" id="status">Loading guide data…</div>
    </header>

    <main class="layout">
      <section class="panel picker-panel" aria-labelledby="picker-title">
        <div class="panel-heading compact-heading">
          <h2 id="picker-title">Channels</h2>
          <div class="selection-limit">Max 5</div>
        </div>

        <div class="mode-toggle" role="group" aria-label="Channel filter">
          <button id="show-all" class="mode-button active" type="button">All channels</button>
          <button id="show-sports" class="mode-button" type="button">Premium channels</button>
        </div>

        <input id="channel-search" class="search" type="search" placeholder="Search all channels" autocomplete="off" />
        <div id="channel-list" class="channel-list"></div>
      </section>

      <section class="panel guide-panel" aria-label="TV guide">
        <div class="guide-actions">
          <button id="clear-selection" class="secondary-button" type="button">Clear</button>
        </div>
        <div id="guide" class="guide"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
